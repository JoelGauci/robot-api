<!DOCTYPE html>
<html lang="en">
<head>
    <title>Robot Control Center</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #e0e0e0;
            overflow: hidden;
            font-family: sans-serif;
        }
        #overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 4px;
            pointer-events: none;
            font-size: 12px;
            color: #333;
        }
        h1 { margin: 0 0 5px 0; font-size: 16px; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>🤖 Robot Active</h1>
        <p>Waiting for directives via API...</p>
        <p id="status-text">Current State: Walking</p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let mixer, actions, activeAction, previousAction, face, clock;
        
        const api = { state: 'Walking' };
        const states = ['Idle', 'Walking', 'Running', 'Dance', 'Death', 'Sitting', 'Standing'];
        const emotes = ['Jump', 'Yes', 'No', 'Wave', 'Punch', 'ThumbsUp'];
        
        const statusEl = document.getElementById('status-text');

        // Setup scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xe0e0e0);
        scene.fog = new THREE.Fog(0xe0e0e0, 20, 100);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.25, 100);
        camera.position.set(-5, 3, 10);
        camera.lookAt(0, 2, 0);

        clock = new THREE.Clock();

        // Lighting
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x8d8d8d, 3);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 3);
        dirLight.position.set(0, 20, 10);
        scene.add(dirLight);

        // Ground
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshPhongMaterial({ color: 0xcbcbcb, depthWrite: false }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const grid = new THREE.GridHelper(200, 40, 0x000000, 0x000000);
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        scene.add(grid);

        // Load Robot Model from local public assets
        const loader = new GLTFLoader();
        const modelUrl = 'RobotExpressive.glb';

        loader.load(modelUrl, function (gltf) {
            const model = gltf.scene;
            scene.add(model);

            // Initialise animation systems
            mixer = new THREE.AnimationMixer(model);
            actions = {};

            gltf.animations.forEach(clip => {
                const action = mixer.clipAction(clip);
                actions[clip.name] = action;

                // Handle loop constraints as in original code
                if (emotes.includes(clip.name) || states.indexOf(clip.name) >= 4) {
                    action.clampWhenFinished = true;
                    action.loop = THREE.LoopOnce;
                }
            });

            // FIX: Persistent global finished listener to safely restore base state
            mixer.addEventListener('finished', (event) => {
                const finishedClipName = event.action.getClip().name;
                // Only transition back if an EMOTE finishes AND it is still the active item (avoids race override)
                if (emotes.includes(finishedClipName) && event.action === activeAction) {
                    fadeToAction(api.state, 0.2);
                    statusEl.textContent = `Current State: ${api.state}`;
                }
            });

            face = model.getObjectByName('Head_4');
            
            // FIX: Use dynamic loading check to respect directives received during loading
            const startState = api.state && actions[api.state] ? api.state : 'Walking';
            activeAction = actions[startState];
            if (activeAction) activeAction.play();

            console.log("Robot loaded & prepped with default state:", startState);
        }, undefined, (error) => {
            console.error('Error loading glb model:', error);
        });

        // Renderer
        // Use conservative configurations to maximize compatibility on software renderers
        const renderer = new THREE.WebGLRenderer({ 
            antialias: false, // MSAA frequently crashes on software drivers like llvmpipe
            failIfMajorPerformanceCaveat: false, 
            powerPreference: 'low-power'
        });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            if (mixer) mixer.update(dt);
            renderer.render(scene, camera);
        }
        animate();

        // Transition Functions
        function fadeToAction(name, duration) {
            if (!actions || !actions[name]) {
                console.warn(`Action named "${name}" not found`);
                return;
            }

            previousAction = activeAction;
            activeAction = actions[name];

            if (previousAction && previousAction !== activeAction) {
                previousAction.fadeOut(duration);
            }

            activeAction
                .reset()
                .setEffectiveTimeScale(1)
                .setEffectiveWeight(1)
                .fadeIn(duration)
                .play();
        }

        // Function removed as it was replaced by centralized listener inside loader callback

        // --- Bridge Socket.io Handlers ---
        const socket = io();

        // Case insensitive matcher utility helper
        function findMatch(arr, target) {
            return arr.find(item => item.toLowerCase() === target.toLowerCase());
        }

        socket.on('robot:state', (data) => {
            console.log("Received state directive:", data);
            const exactName = findMatch(states, data.name);
            if (exactName) {
                api.state = exactName;
                fadeToAction(exactName, 0.5);
                statusEl.textContent = `Current State: ${exactName}`;
            } else {
                console.warn(`Unsupported state requested: ${data.name}`);
            }
        });

        socket.on('robot:emote', (data) => {
            console.log("Received emote directive:", data);
            const exactName = findMatch(emotes, data.name);
            if (exactName) {
                statusEl.textContent = `Emoting: ${exactName}`;
                fadeToAction(exactName, 0.2);
                // Fixed: dynamic addEventListener removed here to prevent event leak
            } else {
                console.warn(`Unsupported emote requested: ${data.name}`);
            }
        });

        socket.on('robot:expression', (data) => {
            console.log("Received expression directive:", data);
            if (!face || !face.morphTargetDictionary) {
                console.warn("Face mesh not found or not ready.");
                return;
            }
            
            // Attempt to resolve expression index by finding case-insensitive key
            const keys = Object.keys(face.morphTargetDictionary);
            const matchedKey = findMatch(keys, data.name);

            if (matchedKey) {
                const index = face.morphTargetDictionary[matchedKey];
                face.morphTargetInfluences[index] = parseFloat(data.value);
                console.log(`Updated expression ${matchedKey} influencer index ${index} to ${data.value}`);
            } else {
                console.warn(`Expression keyword "${data.name}" not matched among available face keys:`, keys);
            }
        });

    </script>
</body>
</html>
